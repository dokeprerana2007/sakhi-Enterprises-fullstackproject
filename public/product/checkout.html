<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sakhi Enterprises – Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --green:#2e7d32;
  --border:#c8e6c9;
  --light:#e8f5e9;
  --text:#1b5e20;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#f4f8f4;
  color:var(--text);
}
header{
  background:var(--green);
  color:#fff;
  padding:16px 24px;
  font-size:22px;
  font-weight:700;
}
.container{
  max-width:900px;
  margin:30px auto;
}
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:25px;
}
.btn{
  margin-top:20px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:8px;
  background:var(--green);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}
.change-btn{
  background:#fff;
  color:var(--green);
  border:2px solid var(--green);
}
.summary-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}
.summary-total{
  display:flex;
  justify-content:space-between;
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>Sakhi Enterprises – Secure Checkout</header>

<div class="container">
  <div class="card">

    <h2>Delivery Address</h2>
    <div id="address-box">Loading...</div>

    <button class="btn change-btn" onclick="changeAddress()">Change Address</button>
    <button class="btn change-btn" onclick="goToShop()">Add More Products</button>

    <h2>Order Summary</h2>
    <div id="summary-items"></div>

    <div class="summary-total">
      <span>Total</span>
      <span id="summary-total">₹0</span>
    </div>

    <button id="payBtn" class="btn">Pay ₹0</button>

  </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
const RAZORPAY_KEY = "rzp_test_S8l9sAf2Mc1cyv";
const BACKEND = window.location.origin;

let checkoutData = {};
let currentItemId = null; // 🔥 STORE ITEM ID

// ================= LOAD CHECKOUT =================
async function loadCheckout() {

  const params = new URLSearchParams(window.location.search);
  const itemId = params.get("itemId");
  currentItemId = itemId; // store globally

  // ===== SINGLE PRODUCT =====
  if (itemId) {
    const res = await fetch(`${BACKEND}/cart/${itemId}`, {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });

    const item = await res.json();

    checkoutData.items = [item];
    checkoutData.total = item.price * item.quantity;

    document.getElementById("summary-items").innerHTML = `
      <div class="summary-item">
        <span>${item.name} (x${item.quantity})</span>
        <span>₹${item.price * item.quantity}</span>
      </div>
    `;

  } 
  // ===== FULL CART =====
  else {
    const res = await fetch(`${BACKEND}/cart`, {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();

    let total = 0;
    let html = "";

    data.forEach(item => {
      total += item.price * item.quantity;
      html += `
        <div class="summary-item">
          <span>${item.name} (x${item.quantity})</span>
          <span>₹${item.price * item.quantity}</span>
        </div>
      `;
    });

    checkoutData.items = data;
    checkoutData.total = total;

    document.getElementById("summary-items").innerHTML = html;
  }

  document.getElementById("summary-total").textContent = "₹" + checkoutData.total;
  document.getElementById("payBtn").textContent = "Pay ₹" + checkoutData.total;

  await loadAddress();
}

// ================= ADDRESS =================
async function loadAddress() {
  const res = await fetch(`${BACKEND}/api/profile/profiledata`, {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();
  checkoutData.address = data.address;

  document.getElementById("address-box").innerHTML = data.address
    ? `${data.username}<br>${data.address.street}, ${data.address.city}`
    : "No address found";
}

document.addEventListener("DOMContentLoaded", loadCheckout);

// ================= PAYMENT =================
document.getElementById("payBtn").addEventListener("click", async () => {

  if (!checkoutData.total) return alert("Cart empty");

  const orderRes = await fetch(`${BACKEND}/api/payment/create-order`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({ amount: checkoutData.total })
  });

  const order = await orderRes.json();

  const rzp = new Razorpay({
    key: RAZORPAY_KEY,
    amount: order.amount,
    order_id: order.id,
    handler: async function (response) {

      await fetch(`${BACKEND}/order/place`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          items: checkoutData.items,
          address: checkoutData.address
        })
      });

      alert("Order Placed!");
      window.location.href = "success.html";
    }
  });

  rzp.open();
});

// ================= NAVIGATION =================

// 🔥 FIXED FUNCTION
function goToShop() {
  if (currentItemId) {
    // preserve single product flow
    window.location.href = `product.html?itemId=${currentItemId}`;
  } else {
    // normal cart flow
    window.location.href = "product.html";
  }
}

function changeAddress() {
  window.location.href = "profile.html";
}

</script>

</body>
</html>
